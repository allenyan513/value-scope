name: Cron Jobs

on:
  schedule:
    # Update Prices: 1x weekdays — 5:30 PM ET (UTC: 21:30)
    - cron: '30 21 * * 1-5'
    # Refresh After Earnings: 1x weekdays — 7:00 PM ET (UTC: 23:00)
    - cron: '0 23 * * 1-5'
  workflow_dispatch:
    inputs:
      job:
        description: 'Which cron job to run'
        required: true
        type: choice
        options:
          - update-prices
          - refresh-after-earnings
          - refresh-estimates-full
          - recompute-valuations
          - all

env:
  BASE_URL: https://valuescope.vercel.app

jobs:
  update-prices:
    if: >-
      github.event_name == 'workflow_dispatch' && (inputs.job == 'update-prices' || inputs.job == 'all') ||
      github.event_name == 'schedule' && github.event.schedule == '30 21 * * 1-5'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger update-prices
        run: |
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ env.BASE_URL }}/api/cron/update-prices")
          echo "Response status: $STATUS"
          if [ "$STATUS" -ne 200 ]; then exit 1; fi

  refresh-after-earnings:
    if: >-
      github.event_name == 'workflow_dispatch' && (inputs.job == 'refresh-after-earnings' || inputs.job == 'all') ||
      github.event_name == 'schedule' && github.event.schedule == '0 23 * * 1-5'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger refresh-after-earnings
        run: |
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ env.BASE_URL }}/api/cron/refresh-after-earnings")
          echo "Response status: $STATUS"
          if [ "$STATUS" -ne 200 ]; then exit 1; fi

  # Manual-only: full estimate refresh for all stocks (not scheduled)
  refresh-estimates-full:
    if: >-
      github.event_name == 'workflow_dispatch' && (inputs.job == 'refresh-estimates-full' || inputs.job == 'all')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger refresh-estimates (full)
        run: |
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ env.BASE_URL }}/api/cron/refresh-estimates?full=true")
          echo "Response status: $STATUS"
          if [ "$STATUS" -ne 200 ]; then exit 1; fi

  # Manual-only: recompute all valuation snapshots
  recompute-valuations:
    if: >-
      github.event_name == 'workflow_dispatch' && (inputs.job == 'recompute-valuations' || inputs.job == 'all')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger recompute-valuations
        run: |
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ env.BASE_URL }}/api/cron/recompute-valuations")
          echo "Response status: $STATUS"
          if [ "$STATUS" -ne 200 ]; then exit 1; fi
